      url: "https://www.shrm.org/credentials/shrm-body-of-applied-skills-and-knowledge"
    - name: "CIPD Profession Map"
      url: "https://www.cipd.org/en/the-people-profession/the-profession-map/"
    - name: "Josh Bersin - HR Technology Market"
      url: "https://joshbersin.com/"
